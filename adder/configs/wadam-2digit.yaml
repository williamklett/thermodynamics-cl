# System
system:
  seed: 3407
  work_dir: ./out/adder/workadam

# Data
data:
  ndigit: 2

# Model
model:
  block_size: 1024
  vocab_size: 50304
  n_layer: 3
  n_head: 3
  n_embd: 48
  dropout: 0.0
  bias: true

# Trainer
trainer:
  device: auto
  num_workers: 0
  max_iters: 5000
  batch_size: 64
  grad_norm_clip: 1.0

  optimizer:
    name: workadam
    lr: 5e-4
    beta1: 0.9
    rho: 0.9925
    weight_decay: 0.1
    mass_init: 1e-3