# System
system:
  seed: 3407
  work_dir: ./out/adder/adam

# Data
data:
  ndigit: 2

# Model
model:
  block_size: 1024
  vocab_size: 50304
  n_layer: 3
  n_head: 3
  n_embd: 48
  dropout: 0.0
  bias: true

# Trainer
trainer:
  device: auto
  num_workers: 0
  max_iters: 5000
  batch_size: 64
  grad_norm_clip: 1.0

  optimizer:
    name: adamw
    lr: 5e-4
    betas: [0.9, 0.95]
    weight_decay: 0.1